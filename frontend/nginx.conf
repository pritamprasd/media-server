resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/homeserver.crt;
    ssl_certificate_key /etc/nginx/certs/homeserver.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
        client_max_body_size 500m;
        set $backend_api http://backend:5000;
        proxy_pass $backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        set $backend_health http://backend:5000;
        proxy_pass $backend_health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ca.crt {
        add_header Content-Type application/x-pem-file;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

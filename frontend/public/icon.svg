<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="96" y="144" width="320" height="224" rx="48" fill="none" stroke="#e94560" stroke-width="20" stroke-linejoin="round"/>
  <!-- Lens -->
  <circle cx="224" cy="256" r="56" fill="none" stroke="#e94560" stroke-width="16"/>
  <circle cx="224" cy="256" r="28" fill="#e94560" opacity="0.3"/>
  <circle cx="224" cy="256" r="12" fill="#e94560"/>
  <!-- Flash -->
  <circle cx="360" cy="180" r="18" fill="#e94560" opacity="0.6"/>
  <!-- Play triangle overlay -->
  <polygon points="290,240 290,272 316,256" fill="#1a1a2e" opacity="0.9"/>
  <!-- Accent dot -->
  <circle cx="168" cy="180" r="12" fill="#533483"/>

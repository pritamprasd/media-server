services:
  backend:
    container_name: media_server_be
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "15020:5000"
    env_file: ./backend/.env
    command: sh -c "flask db upgrade && gunicorn -w 4 -b 0.0.0.0:5000 --timeout 120 run:app"
    volumes:
      - /home/pritam/media_server_files/edited:/edited
      - ${MEDIA_PATH:-/media}:/media:ro
      - /home/pritam/media_server_files:/media_files
      - /home/pritam/media_server_files/uploads:/uploads
    networks:
      - default-network
    user: "${UID}:${GID}"
    dns:
      - 172.17.0.1
    restart: unless-stopped

  worker-import:
    container_name: media_server_w_import
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q import_queue -l info --concurrency=1 --hostname=import@%h
    volumes:
      - /home/pritam/media_server_files/edited:/edited
      - ${MEDIA_PATH:-/media}:/media:ro
      - /home/pritam/media_server_files:/media_files
      - /home/pritam/media_server_files/uploads:/uploads
    networks:
      - default-network
    dns:
      - 172.17.0.1
    restart: unless-stopped

  worker-metadata:
    container_name: media_server_w_metadata
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q metadata -l info --concurrency=3 --hostname=metadata@%h
    volumes:
      - /home/pritam/media_server_files/edited:/edited
      - ${MEDIA_PATH:-/media}:/media:ro
      - /home/pritam/media_server_files:/media_files
      - /home/pritam/media_server_files/uploads:/uploads
    networks:
      - default-network
    dns:
      - 172.17.0.1
    restart: unless-stopped

  worker-ai:
    container_name: media_server_w_ai
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q ai_metadata -l info --concurrency=1 --hostname=ai@%h
    volumes:
      - /home/pritam/media_server_files/edited:/edited
      - ${MEDIA_PATH:-/media}:/media:ro
      - /home/pritam/media_server_files:/media_files
      - /home/pritam/media_server_files/uploads:/uploads
    networks:
      - default-network
    dns:
      - 172.17.0.1
    restart: unless-stopped

  worker-thumbnail:
    container_name: media_server_w_thumb
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q thumbnail -l info --concurrency=3 --hostname=thumbnail@%h
    volumes:
      - /home/pritam/media_server_files/edited:/edited
      - ${MEDIA_PATH:-/media}:/media:ro
      - /home/pritam/media_server_files:/media_files
      - /home/pritam/media_server_files/uploads:/uploads
    networks:
      - default-network
    dns:
      - 172.17.0.1
    restart: unless-stopped

  worker-face:
    container_name: media_server_w_face
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    environment:
      - FACE_PROVIDERS=CPUExecutionProvider
      - FACE_MATCH_THRESHOLD=0.4
      - FACE_DET_THRESH=0.3
    command: celery -A app.tasks.celery worker -Q face_detection -l info --concurrency=1 --hostname=face@%h
    volumes:
      - /home/pritam/media_server_files/edited:/edited
      - ${MEDIA_PATH:-/media}:/media:ro
      - /home/pritam/media_server_files:/media_files
      - /home/pritam/media_server_files/uploads:/uploads
      - /home/pritam/.insightface:/root/.insightface
    networks:
      - default-network
    dns:
      - 172.17.0.1
      - 8.8.8.8
    restart: unless-stopped

  frontend:
    container_name: media_server_fe
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3443:443"
    volumes:
      - /home/pritam/media_server_files/certs:/etc/nginx/certs
    networks:
      - default-network
    dns:
      - 172.17.0.1
    restart: unless-stopped

networks:
  default-network:
    external: true
    name: default-network

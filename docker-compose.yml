services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    command: sh -c "flask db upgrade && gunicorn -w 4 -b 0.0.0.0:5000 run:app"
    volumes:
      - edited_images:/root/media-server-edited
      - ${MEDIA_PATH:-/media}:/media:ro

  worker-import:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q import_queue -l info --concurrency=1
    volumes:
      - ${MEDIA_PATH:-/media}:/media:ro

  worker-metadata:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q metadata -l info --concurrency=4
    volumes:
      - ${MEDIA_PATH:-/media}:/media:ro

  worker-ai:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q ai_metadata -l info --concurrency=2
    volumes:
      - ${MEDIA_PATH:-/media}:/media:ro

  worker-thumbnail:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    command: celery -A app.tasks.celery worker -Q thumbnail -l info --concurrency=3
    volumes:
      - ${MEDIA_PATH:-/media}:/media:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"

volumes:
  edited_images:

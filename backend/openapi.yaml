openapi: 3.1.0
info:
  title: Media Server API
  version: 1.0.0
  description: >-
    REST API for the Media Server backend (Flask). All routes are mounted under
    the `/api` prefix by the API blueprint, so a route such as `/files` is
    exposed as `/api/files`. This specification documents the Files, Import &
    Upload, Media Explorer, Favorites, Duplicates, Filters, Locations, Faces &
    Persons, Collections, User Memories, Tools, and System & Geocoding
    endpoints.
servers:
  - url: http://localhost:5000/api
    description: Local development
security: []
tags:
  - name: System & Geocoding
  - name: Files
  - name: Import & Upload
  - name: Media Explorer
  - name: Favorites
  - name: Duplicates
  - name: Filters
  - name: Locations
  - name: Faces & Persons
  - name: Collections
  - name: User Memories
  - name: Tools

components:
  parameters:
    HiddenPinHeader:
      name: X-Hidden-Pin
      in: header
      required: false
      description: 6-digit PIN protecting hidden files. Required (and validated) for hidden-file endpoints.
      schema:
        type: string
        example: "123456"
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]
    StatusResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
    StatsResponse:
      type: object
      properties:
        overview:
          type: object
          additionalProperties: true
          properties:
            total_files: { type: integer }
            total_favorites: { type: integer }
            total_metadata: { type: integer }
            total_size: { type: integer }
            total_size_formatted: { type: string }
        mime_breakdown:
          type: object
          additionalProperties: true
        mime_detail:
          type: array
          items:
            type: object
            properties:
              mime: { type: string }
              count: { type: integer }
        metadata_status:
          type: array
          items:
            type: object
            properties:
              status: { type: [string, "null"] }
              count: { type: integer }
        thumbnail_status:
          type: array
          items:
            type: object
            properties:
              status: { type: [string, "null"] }
              count: { type: integer }
        files_by_date:
          type: array
          items:
            type: object
            additionalProperties: true
        top_tags:
          type: array
          items:
            type: object
            properties:
              tag: { type: string }
              count: { type: integer }
        dimension_ranges:
          type: object
          additionalProperties: { type: integer }
        size_distribution:
          type: array
          items:
            type: object
            properties:
              range: { type: string }
              count: { type: integer }
        coverage:
          type: object
          additionalProperties: true
        sessions:
          type: object
          additionalProperties: true
        faces:
          type: object
          additionalProperties: true
      additionalProperties: true
    PaginatedFiles:
      type: object
      properties:
        files:
          type: array
          items:
            type: object
            additionalProperties: true
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }
      required: [files, total, page, per_page, pages]
    PaginatedPersons:
      type: object
      properties:
        persons:
          type: array
          items:
            type: object
            additionalProperties: true
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }
      required: [persons, total, page, per_page, pages]
    PaginatedFaces:
      type: object
      properties:
        faces:
          type: array
          items:
            type: object
            additionalProperties: true
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }
      required: [faces, total, page, per_page, pages]
    File:
      type: object
      additionalProperties: true
      description: ImportedFile record (id, filename, file_path, mime_type, size, etc.).
    FileMetadata:
      type: object
      additionalProperties: true
      description: FileMetadata record (description, tags, width, height, latitude, longitude, date_taken, etc.).
    Person:
      type: object
      additionalProperties: true
      description: Person record (id, name, face_count, avg_encoding, etc.).
    DetectedFace:
      type: object
      additionalProperties: true
      description: DetectedFace record (id, person_id, confidence, encoding, etc.).
    Collection:
      type: object
      additionalProperties: true
      description: Collection record (id, name, description, cover_file_id, file_count, files, etc.).
    SavedLocation:
      type: object
      additionalProperties: true
      description: SavedLocation record (id, name, latitude, longitude, radius, file_count).
    FilterPreset:
      type: object
      additionalProperties: true
      description: FilterPreset record (id, name, operations, file_id).
    UserMemory:
      type: object
      additionalProperties: true
      description: UserMemory record (id, file_id, content, tags, created_at).

paths:
  /status:
    get:
      operationId: getStatus
      tags: [System & Geocoding]
      summary: API health/status check
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /stats/refresh:
    post:
      operationId: refreshStats
      tags: [System & Geocoding]
      summary: Recompute cached library statistics
      responses:
        "200":
          description: Stats refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
  /directories:
    get:
      operationId: listDirectories
      tags: [Files]
      summary: List all imported directories
      responses:
        "200":
          description: List of directories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /browse-fs:
    get:
      operationId: browseFileSystem
      tags: [Files]
      summary: Browse the local filesystem directory tree
      parameters:
        - name: path
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Directory contents
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Directory not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /import:
    post:
      operationId: importFolder
      tags: [Import & Upload]
      summary: Import a folder into the library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Absolute path of the folder to import (required).
                groups:
                  type: array
                  items: { type: string }
                  description: MIME groups to import, e.g. ["image","video"] (required).
              required: [path, groups]
      responses:
        "201":
          description: Import initiated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Missing path or groups
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Directory not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /sessions:
    get:
      operationId: listSessions
      tags: [Import & Upload]
      summary: List import sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /sessions/{session_id}/browse:
    get:
      operationId: browseSession
      tags: [Import & Upload]
      summary: Browse files and directories within an import session
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: integer }
        - name: path
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Session directory contents
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Session not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/metadata:
    get:
      operationId: getFileMetadata
      tags: [Files]
      summary: Get metadata for a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileMetadata" }
        "404":
          description: File or metadata not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      operationId: updateFileMetadata
      tags: [Files]
      summary: Update metadata (e.g. date_taken) for a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                date_taken:
                  type: [string, "null"]
                  description: ISO 8601 datetime string, or null to clear.
      responses:
        "200":
          description: Updated metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileMetadata" }
        "400":
          description: Invalid date format
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: File or metadata not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/tags:
    patch:
      operationId: updateFileTags
      tags: [Files]
      summary: Set tags for a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items: { type: string }
              required: [tags]
      responses:
        "200":
          description: Updated tags
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items: { type: string }
        "400":
          description: tags must be a list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: File or metadata not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/batch-metadata:
    post:
      operationId: batchUpdateMetadata
      tags: [Files]
      summary: Batch update metadata (date_taken) for multiple files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file_ids:
                  type: array
                  items: { type: integer }
                date_taken:
                  type: [string, "null"]
              required: [file_ids]
      responses:
        "200":
          description: Update count
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/batch-memories:
    post:
      operationId: batchCreateMemories
      tags: [User Memories]
      summary: Create a user memory/note on multiple files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file_ids:
                  type: array
                  items: { type: integer }
                content:
                  type: string
                tags:
                  oneOf:
                    - type: array
                      items: { type: string }
                    - type: string
              required: [file_ids, content]
      responses:
        "201":
          description: Created count
          content:
            application/json:
              schema:
                type: object
                properties:
                  created: { type: integer }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/favorite:
    patch:
      operationId: toggleFavorite
      tags: [Favorites]
      summary: Toggle favorite flag on a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema: { $ref: "#/components/schemas/File" }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/primary:
    patch:
      operationId: togglePrimary
      tags: [Duplicates]
      summary: Toggle primary (keep) flag on a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema: { $ref: "#/components/schemas/File" }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files:
    get:
      operationId: listFiles
      tags: [Files]
      summary: List files with filtering, search and pagination
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 50 }
        - name: mime_group
          in: query
          required: false
          schema: { type: string, enum: [image, video] }
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: directory_id
          in: query
          required: false
          schema: { type: integer }
        - name: min_width
          in: query
          required: false
          schema: { type: integer }
        - name: min_height
          in: query
          required: false
          schema: { type: integer }
        - name: sort_by
          in: query
          required: false
          schema: { type: string, enum: [created_at, filename, size], default: created_at }
        - name: sort_dir
          in: query
          required: false
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: tag
          in: query
          required: false
          schema: { type: string }
        - name: has_ai
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Paginated file list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedFiles" }
  /files/hidden:
    get:
      operationId: listHiddenFiles
      tags: [Files]
      summary: List hidden files (requires PIN)
      parameters:
        - $ref: "#/components/parameters/HiddenPinHeader"
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 50 }
        - name: mime_group
          in: query
          required: false
          schema: { type: string, enum: [image, video] }
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: sort_by
          in: query
          required: false
          schema: { type: string, enum: [created_at, filename, size], default: created_at }
        - name: sort_dir
          in: query
          required: false
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: tag
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Paginated hidden file list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedFiles" }
        "403":
          description: Invalid PIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/toggle-hidden:
    patch:
      operationId: toggleHidden
      tags: [Files]
      summary: Toggle hidden flag on a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: New hidden state
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  is_hidden: { type: boolean }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/verify-hidden-pin:
    post:
      operationId: verifyHiddenPin
      tags: [Files]
      summary: Verify the hidden-files PIN
      parameters:
        - $ref: "#/components/parameters/HiddenPinHeader"
      responses:
        "200":
          description: PIN valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
        "403":
          description: Invalid PIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/unhide:
    post:
      operationId: unhideFiles
      tags: [Files]
      summary: Unhide multiple files (requires PIN)
      parameters:
        - $ref: "#/components/parameters/HiddenPinHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file_ids:
                  type: array
                  items: { type: integer }
              required: [file_ids]
      responses:
        "200":
          description: Count unhidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  unhidden: { type: integer }
        "400":
          description: No file IDs provided
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Invalid PIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /duplicates:
    get:
      operationId: listDuplicates
      tags: [Duplicates]
      summary: List exact or near duplicate files
      parameters:
        - name: type
          in: query
          required: false
          schema: { type: string, enum: [exact, near], default: exact }
      responses:
        "200":
          description: Duplicate groups or pairs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid type
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/near-duplicates:
    get:
      operationId: getNearDuplicates
      tags: [Duplicates]
      summary: Find near-duplicate files for a specific file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Near-duplicate list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: No dhash available
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /favorites:
    get:
      operationId: listFavorites
      tags: [Favorites]
      summary: List all favorite files
      responses:
        "200":
          description: Favorite files
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/File" }
  /files/{file_id}/thumbnail:
    get:
      operationId: getFileThumbnail
      tags: [Files]
      summary: Get the base64 thumbnail for a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Thumbnail data
          content:
            application/json:
              schema:
                type: object
                properties:
                  thumbnail: { type: string }
                  thumbnail_status: { type: string }
        "404":
          description: Thumbnail not available
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/regenerate-ai:
    post:
      operationId: regenerateAiMetadata
      tags: [Files]
      summary: Queue AI metadata regeneration for a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "202":
          description: Regeneration queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: Airplane mode enabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/regenerate-exif:
    post:
      operationId: regenerateExif
      tags: [Files]
      summary: Queue EXIF/metadata extraction for a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "202":
          description: Regeneration queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/regenerate-thumbnail:
    post:
      operationId: regenerateThumbnail
      tags: [Files]
      summary: Queue thumbnail regeneration for a file
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "202":
          description: Regeneration queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/edit:
    post:
      operationId: editFile
      tags: [Files]
      summary: Apply edit operations to an image/video and save a new edited copy
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operations:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                    description: Each op has a `type` plus type-specific fields (value, degrees, direction, x/y/width/height, name, colors, tolerance).
              required: [operations]
      responses:
        "201":
          description: Created edited file
          content:
            application/json:
              schema: { $ref: "#/components/schemas/File" }
        "404":
          description: File not found or missing on disk
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}:
    get:
      operationId: getFile
      tags: [Files]
      summary: Get a single file record
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: File record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/File" }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: deleteFile
      tags: [Files]
      summary: Delete a file (optionally from disk)
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                delete_storage:
                  type: boolean
                  default: false
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/serve:
    get:
      operationId: serveFile
      tags: [Files]
      summary: Serve the raw file (with range support for video, HEIC conversion)
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: File bytes (binary)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: File not found or missing on disk
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /files/{file_id}/download:
    get:
      operationId: downloadFile
      tags: [Files]
      summary: Download a file as an attachment
      parameters:
        - name: file_id
          in: path
          required: true
          schema: { type: integer }
